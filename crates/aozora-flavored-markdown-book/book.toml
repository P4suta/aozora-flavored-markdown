[book]
title    = "Aozora Flavored Markdown (aozora-flavored-markdown)"
authors  = ["aozora-flavored-markdown contributors"]
language = "en"
src      = "src"

[rust]
edition = "2024"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/P4suta/aozora-flavored-markdown"
edit-url-template = "https://github.com/P4suta/aozora-flavored-markdown/edit/main/crates/aozora-flavored-markdown-book/{path}"
site-url = "/aozora-flavored-markdown/"
additional-css = []

[output.html.fold]
enable = true
level  = 1

[output.html.search]
enable = true
use-boolean-and = true

# [output.linkcheck] is disabled here because mdbook-linkcheck upstream has
# not yet caught up to the RenderContext schema change in recent mdbook
# releases. Re-enable once compatible versions align.
# [output.linkcheck]
# follow-web-links = false
# warning-policy   = "error"
