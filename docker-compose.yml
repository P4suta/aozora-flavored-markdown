# afm workspace compose file. Every `just` target runs a command here.
#
# Services:
#   dev        — interactive development (stable Rust only; no nightly)
#   fuzz       — dev + nightly + cargo-fuzz + cargo-udeps
#   ci         — fuzz superset; everything every recipe might invoke
#   book       — mdbook serve / build
#   browser    — Playwright (Chromium + WebKit) for M3+ browser tests
#   playground — Vite dev server for the browser playground (port 5173)
#
# Volumes are named so cargo registry + target + sccache persist between runs.

name: afm

x-common-env: &common-env
  # Cargo caches live at /cargo/* — OUTSIDE the /workspace bind mount — on
  # purpose. Nesting a named volume inside the bind mount (the old
  # /workspace/target etc.) makes the Docker daemon create the host-side
  # mountpoint (./target, ./.cargo, ./.sccache) as **root**, which litters
  # the working tree with root-owned junk and breaks any host-side cargo.
  # Keeping the caches at /cargo/* leaves the host's own ./target free and
  # keeps the checkout clean. The named volumes still persist them.
  CARGO_HOME: /cargo/home
  CARGO_TARGET_DIR: /cargo/target
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: /cargo/sccache
  # sccache cannot cache crates compiled with cargo's incremental mode.
  # Cargo defaults incremental=true for workspace members in dev/test profiles,
  # which silently bypasses sccache for the very crates we build most often.
  # Pinning this here applies to every service that inherits x-common-env.
  CARGO_INCREMENTAL: "0"
  SCCACHE_CACHE_SIZE: "10G"
  RUST_BACKTRACE: "1"
  # Use mold as the default linker for faster host-triple builds. The
  # Dockerfile installs mold + clang and writes /root/.cargo/config.toml
  # with the same intent, but CARGO_HOME=/cargo/home above means cargo
  # never reads it — so drive the linker via target-scoped env here.
  # CRUCIAL: scope to the host triple. A plain RUSTFLAGS=-fuse-ld=mold
  # would leak into `wasm-pack build --target wasm32-unknown-unknown`
  # and fail ("rust-lld: error: unknown argument: -fuse-ld=mold"); the
  # wasm linker is rust-lld, not mold. The per-target form keeps host
  # builds fast without breaking wasm. (Mirrors the sibling aozora repo.)
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: "clang"
  TERM: ${TERM:-xterm-256color}
  # /workspace is bind-mounted from the host as a non-root UID, but the
  # container runs as root. Git otherwise refuses operations with
  # "dubious ownership"; whitelist via the GIT_CONFIG_* triplet rather
  # than baking a `git config` invocation into the image (keeps the
  # whitelist local to the compose surface and trivially removable).
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "/workspace"
  # Optional GitHub Actions cache backend for sccache. The forward-from-
  # host pattern below ({KEY}: ) leaves the variable UNSET in the
  # container when the host doesn't have it set — important because
  # sccache 0.15+ rejects an empty string ("must be 'true', 'on', '1',
  # 'false', 'off' or '0'") and even "false" is treated as enabled in
  # some sccache code paths. Local dev: unset = sccache uses the disk
  # volume cache. CI: setup-dev-image sets these three on the runner so
  # the container sees the real GHA cache backend.
  # (Listed under the service's `environment:` blocks below — YAML
  # maps can't have key-only entries.)

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: afm-dev:local
    working_dir: /workspace
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
    init: true
    tty: true
    stdin_open: true

  # Dev + nightly + cargo-fuzz + cargo-udeps. Used by `just udeps`,
  # `just fuzz*`, and `just coverage-branch` so the plain `dev` image
  # stays slim (no nightly toolchain) for the majority of inner-loop use.
  fuzz:
    build:
      context: .
      dockerfile: Dockerfile
      target: fuzz
    image: afm-fuzz:local
    working_dir: /workspace
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
    init: true
    tty: true
    stdin_open: true

  ci:
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
    image: afm-ci:local
    working_dir: /workspace
    environment:
      <<: *common-env
      CI: "true"
    volumes:
      # `:cached` (writable): CI steps emit artifacts back into the tree
      # (wasm `pkg/`, generated docs, coverage reports), so the source
      # mount stays writable. The cargo caches now live at /cargo/*
      # (outside this bind mount), so the old ":ro hides the nested
      # /workspace/{target,.cargo,.sccache} mountpoints" hazard is gone.
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache

  book:
    build:
      context: .
      dockerfile: Dockerfile
      target: book
    image: afm-book:local
    working_dir: /workspace/crates/afm-book
    volumes:
      - .:/workspace:cached
    ports:
      - "3000:3000"

  browser:
    build:
      context: .
      dockerfile: Dockerfile
      target: browser
    image: afm-browser:local
    working_dir: /workspace
    environment:
      <<: *common-env
      CI: "true"
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target

  # Vite dev / preview server for the browser playground.
  # Reuses the `dev` image (which already has Node 22 + wasm-pack) so no
  # extra build target is needed. `node_modules` lives in a named volume so
  # the bind-mount of `/workspace` doesn't drag npm's tree through the
  # cross-filesystem boundary (slow on Docker Desktop / WSL).
  playground:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: afm-dev:local
    working_dir: /workspace/playground
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
      - playground-node-modules:/workspace/playground/node_modules
    ports:
      - "5173:5173"
    init: true
    tty: true
    stdin_open: true

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  sccache:
  playground-node-modules:
