# afm workspace compose file. Every `just` target runs a command here.
#
# Services:
#   dev        — interactive development (stable Rust only; no nightly)
#   fuzz       — dev + nightly + cargo-fuzz + cargo-udeps
#   ci         — fuzz superset; everything every recipe might invoke
#   book       — mdbook serve / build
#   browser    — Playwright (Chromium + WebKit) for M3+ browser tests
#   playground — Vite dev server for the browser playground (port 5173)
#
# Volumes are named so cargo registry + target + sccache persist between runs.

name: afm

x-common-env: &common-env
  # Cargo caches live at /cargo/* (named volumes), OUTSIDE the /workspace bind
  # mount: a volume nested under the bind mount makes the daemon create the
  # host mountpoint (./target etc.) as root and litter the working tree.
  CARGO_HOME: /cargo/home
  CARGO_TARGET_DIR: /cargo/target
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: /cargo/sccache
  # sccache can't cache incremental builds, and cargo defaults
  # incremental=true for workspace members — disable it so sccache applies.
  CARGO_INCREMENTAL: "0"
  SCCACHE_CACHE_SIZE: "10G"
  RUST_BACKTRACE: "1"
  # Ride out transient crates.io blips (cargo's default retry is 3).
  CARGO_NET_RETRY: "10"
  # mold linker for the host triple. Driven by env (not config.toml, which
  # cargo skips under CARGO_HOME=/cargo/home) and scoped to the host triple:
  # a plain RUSTFLAGS=-fuse-ld=mold would leak into `wasm-pack` and break the
  # wasm-lld link.
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: "clang"
  TERM: ${TERM:-xterm-256color}
  # Whitelist the bind-mounted /workspace so git doesn't refuse "dubious
  # ownership" when CI runs as root over a checkout owned by another UID.
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "/workspace"
  # Optional GHA cache backend for sccache. The forward-from-host pattern in
  # the service `environment:` blocks leaves these UNSET when the host hasn't
  # set them (sccache rejects an empty value); CI's setup-dev-image sets them.
  # Local dev unset = sccache uses the disk volume cache.

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: afm-dev:local
    working_dir: /workspace
    # Runtime UID/GID. Unset locally → 1000 (host-owned bind-mount writes);
    # CI sets AFM_UID=0/AFM_GID=0 → root over its throwaway checkout.
    user: "${AFM_UID:-1000}:${AFM_GID:-1000}"
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
    init: true
    tty: true
    stdin_open: true

  # Dev + nightly + cargo-fuzz + cargo-udeps. Used by `just udeps`,
  # `just fuzz*`, and `just coverage-branch` so the plain `dev` image
  # stays slim (no nightly toolchain) for the majority of inner-loop use.
  fuzz:
    build:
      context: .
      dockerfile: Dockerfile
      target: fuzz
    image: afm-fuzz:local
    working_dir: /workspace
    user: "${AFM_UID:-1000}:${AFM_GID:-1000}"  # see `dev` service
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
    init: true
    tty: true
    stdin_open: true

  ci:
    build:
      context: .
      dockerfile: Dockerfile
      target: ci
    image: afm-ci:local
    working_dir: /workspace
    user: "${AFM_UID:-1000}:${AFM_GID:-1000}"  # see `dev` service
    environment:
      <<: *common-env
      CI: "true"
    volumes:
      # Writable: CI steps emit artifacts back into the tree (wasm pkg/,
      # docs, coverage). Cargo caches live at /cargo/*, outside this mount.
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache

  book:
    build:
      context: .
      dockerfile: Dockerfile
      target: book
    image: afm-book:local
    working_dir: /workspace/crates/afm-book
    user: "${AFM_UID:-1000}:${AFM_GID:-1000}"  # see `dev` service
    volumes:
      - .:/workspace:cached
    ports:
      - "3000:3000"

  browser:
    build:
      context: .
      dockerfile: Dockerfile
      target: browser
    image: afm-browser:local
    working_dir: /workspace
    environment:
      <<: *common-env
      CI: "true"
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target

  # Vite dev / preview server for the playground. Reuses the `dev` image
  # (Node 22 + wasm-pack); `node_modules` lives in a named volume to avoid
  # dragging npm's tree across the bind-mount boundary (slow on WSL).
  playground:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: afm-dev:local
    working_dir: /workspace/playground
    user: "${AFM_UID:-1000}:${AFM_GID:-1000}"  # see `dev` service
    environment: *common-env
    volumes:
      - .:/workspace:cached
      - cargo-registry:/cargo/home/registry
      - cargo-git:/cargo/home/git
      - cargo-target:/cargo/target
      - sccache:/cargo/sccache
      - playground-node-modules:/workspace/playground/node_modules
    ports:
      - "5173:5173"
    init: true
    tty: true
    stdin_open: true

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  sccache:
  playground-node-modules:
