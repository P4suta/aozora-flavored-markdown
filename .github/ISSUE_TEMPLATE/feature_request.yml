name: Feature request
description: Propose a new Aozora notation, CLI flag, API surface, or behaviour.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Concrete motivation — a real Aozora
        Bunko text that needs the notation, a CommonMark construction
        that would benefit, a corpus-sweep hit — makes triage far
        faster than an abstract wishlist.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        What problem does this solve? If possible, link a real Aozora
        Bunko card that uses the notation or a CommonMark document
        that needs the extension.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        What the user-facing syntax, flag, or API would look like.
        Small "here is what I want to write / run" snippets are
        welcome.
    validations:
      required: true

  - type: input
    id: spec-url
    attributes:
      label: Related Aozora Bunko spec page (if applicable)
      placeholder: https://www.aozora.gr.jp/annotation/

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes the proposal could take, and why you chose this one.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and discussions for a similar request.
          required: true
