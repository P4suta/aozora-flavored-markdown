version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 20
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Keep SHA pins fresh; human-readable tag comments are updated automatically.
    groups:
      actions-sha-bumps:
        patterns: ["*"]
    ignore:
      # `dtolnay/rust-toolchain`'s ref tag IS the toolchain version (@1.96.0
      # installs 1.96.0); auto-bumping it would advance the MSRV. CI pins
      # @stable and passes the version via `with:` (ci.yml msrv job).
      - dependency-name: "dtolnay/rust-toolchain"

  - package-ecosystem: docker
    # Bumps Dockerfile FROM pins (node, playwright). The `rust` base is
    # pinned to the MSRV (= rust-toolchain.toml = 1.96.0); auto-bumping it
    # would silently advance the MSRV, so it is ignored — bump it in a
    # deliberate PR alongside rust-toolchain.toml / Cargo `rust-version`.
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-base-images:
        patterns: ["*"]
    ignore:
      - dependency-name: "rust"

  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: weekly
      day: monday
