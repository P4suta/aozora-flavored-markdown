version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 20
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Keep SHA pins fresh; human-readable tag comments are updated automatically.
    groups:
      actions-sha-bumps:
        patterns: ["*"]
    ignore:
      # `dtolnay/rust-toolchain`'s action ref tag IS the Rust toolchain
      # version (e.g. @1.95.0 installs Rust 1.95.0). Letting Dependabot
      # bump it advances the MSRV unintentionally. We pin @stable + pass
      # the toolchain via `with:` instead — see ci.yml `msrv` job.
      - dependency-name: "dtolnay/rust-toolchain"

  - package-ecosystem: docker
    # Bumps Dockerfile FROM pins (rust, node, playwright).
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-base-images:
        patterns: ["*"]

  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: weekly
      day: monday
