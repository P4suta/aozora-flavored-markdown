# Publish the afm book + rustdoc to GitHub Pages.
#
# afm does not currently publish to crates.io, so docs.rs is not an
# option for the API reference. Instead we build rustdoc locally,
# layer it under the mdbook site at `/afm/api/`, and deploy the whole
# thing to GitHub Pages.
#
# Layout produced:
#   https://p4suta.github.io/afm/            ← mdbook (Welcome, Getting Started, …)
#   https://p4suta.github.io/afm/api/        ← cargo doc --workspace --no-deps
#   https://p4suta.github.io/afm/playground/ ← Solid + Vite browser playground
#
# ADR-0002 scope exception (matching release.yml): docs builds use the
# native runner toolchain rather than the dev Docker image, because the
# Pages deploy actions expect artefacts on the runner filesystem. The
# wasm-pack pin (jetli action `version:` below) matches the Dockerfile
# WASM_PACK_VERSION arg so dev and CI agree on the wasm-bindgen-cli
# that gets auto-fetched.
#
# Action pinning: every third-party action below is pinned to a full
# commit SHA (the `# vX.Y.Z` trailer is the tag it resolved to).
# Dependabot's github-actions ecosystem keeps those SHAs current.
# `dtolnay/rust-toolchain@stable` is the deliberate exception — its ref
# is the moving `stable` branch (we want the newest stable rustc), and
# dependabot.yml ignores it.

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; queue the rest so we never
# partially overwrite the Pages bucket.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: docs

      - uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08  # v2.0.0
        with:
          mdbook-version: latest

      - name: Build rustdoc
        env:
          # Defense-in-depth: the ci.yml `doc` job is the primary rustdoc
          # gate, but harden the deploy build too so a doc regression can't
          # ship even if that job is ever weakened. The workspace denies all
          # rustdoc lints; `-D warnings` turns any escapee into a hard fail.
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Build mdbook
        run: mdbook build crates/afm-book

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          # Pinned alongside the Dockerfile BUN_VERSION arg.
          bun-version: '1.3.14'

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Pinned alongside the Dockerfile WASM_PACK_VERSION arg.
          version: 'v0.15.0'

      - name: Build afm-wasm package
        run: wasm-pack build crates/afm-wasm --target bundler --release --out-dir pkg --out-name afm_wasm

      - name: Install playground deps
        run: cd playground && bun install

      - name: Build playground
        run: cd playground && bun run build

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r crates/afm-book/book/. site/
          mkdir -p site/api
          cp -r target/doc/. site/api/
          mkdir -p site/playground
          cp -r playground/dist/. site/playground/
          # GitHub Pages otherwise runs Jekyll and hides paths like `_sources`.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
        id: deployment
