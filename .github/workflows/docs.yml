# Publish the aozora-flavored-markdown book + rustdoc to GitHub Pages.
#
# aozora-flavored-markdown is not on crates.io, so there is no docs.rs; build rustdoc locally
# and layer it under the mdbook site at `/aozora-flavored-markdown/api/`.
#
# Docs builds use the native runner toolchain, not the dev Docker image:
# the Pages deploy actions expect artefacts on the runner filesystem.
# `dtolnay/rust-toolchain@stable` tracks the moving `stable` branch on
# purpose (newest stable rustc); dependabot.yml ignores it.

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queue the rest so we never partially overwrite
# the Pages bucket.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: docs

      - uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08  # v2.0.0
        with:
          mdbook-version: latest

      - name: Build rustdoc
        env:
          # Fail the deploy build on any rustdoc warning so a doc
          # regression can't ship even if ci.yml's `doc` gate is weakened.
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Build mdbook
        run: mdbook build crates/aozora-flavored-markdown-book

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          # Keep in sync with the Dockerfile BUN_VERSION arg.
          bun-version: '1.3.14'

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Keep in sync with the Dockerfile WASM_PACK_VERSION arg.
          version: 'v0.15.0'

      - name: Build aozora-flavored-markdown-wasm package
        run: wasm-pack build crates/aozora-flavored-markdown-wasm --target bundler --release --out-dir pkg --out-name aozora_flavored_markdown_wasm

      - name: Install playground deps
        run: cd playground && bun install

      - name: Build playground
        run: cd playground && bun run build

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
          cp -r crates/aozora-flavored-markdown-book/book/. site/
          mkdir -p site/api
          cp -r target/doc/. site/api/
          mkdir -p site/playground
          cp -r playground/dist/. site/playground/
          # Without this, Pages runs Jekyll and hides paths like `_sources`.
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
        id: deployment
