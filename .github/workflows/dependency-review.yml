# Dependency review on pull requests.
#
# A PR-time canary that flags the dependency changes a PR introduces and
# comments the diff in the review UI. cargo-deny remains the source of
# truth, checking the full workspace against our licence + advisory rules.

name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          # Match the cargo-deny policy: reject any newly introduced
          # advisory of moderate severity or worse.
          fail-on-severity: moderate

          # Keep in sync with deny.toml's license allow-list.
          # BSD-2-Clause is required for the vendored comrak tree.
          # CC-BY-SA-4.0 covers spec/*.json fixtures that inherit it
          # from the CommonMark / GFM specs (test data, not runtime deps).
          allow-licenses: >-
            Apache-2.0,
            MIT,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            Unicode-DFS-2016,
            Unicode-3.0,
            CC0-1.0,
            MPL-2.0,
            CC-BY-SA-4.0

          # CI-only actions are build-time tooling, never linked into or
          # shipped with the crates, so their licenses are out of scope for
          # the `Apache-2.0 OR MIT` product policy. Swatinem/rust-cache is
          # LGPL-3.0; exempt it. Append a purl here for any future copyleft
          # CI action.
          allow-dependencies-licenses: pkg:githubactions/Swatinem/rust-cache

          # Comment only on failure so clean PRs aren't spammed.
          comment-summary-in-pr: on-failure
