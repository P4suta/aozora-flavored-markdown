# Build and publish the afm dev container image to GHCR.
#
# Lets ci.yml `docker pull ghcr.io/p4suta/afm-dev:latest` instead of
# rebuilding the toolchain + cargo dev tools image (30-40 min) on every
# commit.
#
# Triggers are narrow on purpose: only rebuild when the Dockerfile,
# docker-compose.yml, or rust-toolchain pin change.
#
# Tags `:latest` (mutable, pulled by ci.yml) and `:<commit-sha>`
# (immutable, for git-bisect across image-affecting changes).

name: dev-image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'rust-toolchain.toml'
      - '.github/workflows/dev-image.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'rust-toolchain.toml'
      - '.github/workflows/dev-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: build & push (ghcr.io/p4suta/afm-dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        # Fork PR builds have no GHCR credentials: build to verify but
        # skip login + push.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/p4suta/afm-dev
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long

      - name: Build and push (ci stage)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: Dockerfile
          target: ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dev-image
          cache-to: type=gha,mode=max,scope=dev-image
          provenance: false
