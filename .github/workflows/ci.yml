# afm CI. The `setup-dev-image` composite action pulls the dev image published
# by dev-image.yml (or falls back to a local build), then `just <target>` runs
# on the runner host — each recipe wraps cargo in `docker compose run` itself,
# so this avoids Docker-in-Docker. Action SHAs are pinned; Dependabot bumps weekly.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  DOCKER_BUILDKIT: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  msrv:
    # Verify that the pinned MSRV (1.95.0, see `rust-toolchain.toml`)
    # still builds. ADR-0002 scope exception: native runner toolchain
    # rather than dev image — the point is exercising a clean rustc
    # 1.95.0 install, which the image has no mechanism to downgrade to.
    name: msrv (rust 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust 1.95.0 (MSRV)
        # NB: dtolnay/rust-toolchain uses the action ref tag AS the
        # Rust toolchain version. Pin @stable + pass MSRV via `with:`
        # so Dependabot doesn't unintentionally march the MSRV forward
        # (see .github/dependabot.yml ignore entry).
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: msrv
      - run: cargo check --workspace --all-targets

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        with:
          tool: committed
      # Dependabot's auto-generated subjects/bodies exceed committed's 50/72
      # limits, so skip the lint for bot-authored PRs (squash-merged with a
      # maintainer subject anyway). Guard on the PR *author*, not github.actor:
      # a human re-trigger (e.g. `gh pr update-branch`) changes the actor but
      # not the author, so an actor guard would wrongly lint the bot's commits.
      # `--no-merge-commit` ignores `update-branch` merge commits. The job still
      # runs and succeeds, keeping the required "commitlint" check green.
      - name: Check Conventional Commits (committed)
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: committed --no-merge-commit "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  # Phase-1 fast gate (`cargo check`, no codegen). Phase-2 jobs gate on this
  # so a compile error surfaces in minutes, not after a full build+test.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just check

  # Phase-2 (needs check). `cargo doc` is the only pass that runs
  # `broken_intra_doc_links = "deny"`; without it a broken link escapes to
  # docs.yml post-merge and blocks the Pages deploy.
  doc:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just doc

  # Phase-2 (needs check). IR→TS codegen drift gate (`xtask types check`):
  # fails if afm_types.d.ts wasn't regenerated after an IR change.
  types-check:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just types-check

  # Phase-2 (needs check). Build afm-wasm + the Vite playground at PR time so
  # a wasm-pack or playground break fails here, not post-merge in docs.yml.
  wasm-build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just wasm-build
      - run: just playground-build

  # Phase-1 (parallel with `check`). Style + grep checks, no compile dependency.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just lint

  # Phase-1 (parallel with `check`). Repo-shape sanity (vendored comrak
  # diff = 0 per ADR-0001) does not depend on rust compilation.
  upstream-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just upstream-diff

  # Phase-1 (parallel). Pure grep on the bare runner; catches tool-version
  # pin drift across Dockerfile / playground/package.json / docs.yml.
  verify-version-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912  # v2.81.10
        with:
          tool: just
      - run: just verify-version-pins

  # Phase-2 (needs check). Full build + test cycle.
  build-and-test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just build
      - run: just test

  # Phase-2 (needs check). CommonMark + GFM conformance. (Aozora-layer specs
  # live in the aozora repo; afm exercises the pipeline via `aozora_parity`.)
  spec:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target:
          - spec-commonmark
          - spec-gfm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  # Phase-2 (needs check). Instrumented compile, slow.
  coverage:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just coverage

  # Phase-2 (needs check; `udeps` is nightly and needs the dep graph compiled).
  # `audit-comrak` is its own leg so a RUSTSEC advisory against the vendored
  # path-dep comrak (invisible to `cargo audit`/`deny`) gets a named check.
  audit:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target: [deny, audit, audit-comrak, udeps]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  book:
    runs-on: ubuntu-latest
    # Runs `docker compose run book` directly, so set root here: the book
    # image's non-root user can't write mdbook output into the runner checkout.
    env:
      AFM_UID: "0"
      AFM_GID: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          target: book
          tags: afm-book:local
          load: true
          cache-from: type=gha,scope=book
          cache-to: type=gha,mode=max,scope=book
      - run: docker compose run --rm --no-TTY book mdbook build
