# afm CI
#
# Architecture:
#   - The dev container image is built and published by `dev-image.yml`
#     to ghcr.io/p4suta/afm-dev:latest on Dockerfile / compose changes.
#   - This workflow PULLS that image (via the `setup-dev-image`
#     composite action) and invokes `just <target>` on the runner host.
#     `just` recipes wrap each command in `docker compose run dev cargo
#     ...` (Justfile policy: never invoke cargo on the host directly).
#     Running `just` on the runner — instead of `docker compose run ci
#     just <target>` — avoids Docker-in-Docker: the previous nested
#     pattern hit `bash: docker: command not found` because the `ci`
#     container has no docker client.
#   - If the GHCR image is unavailable (first run before dev-image.yml
#     publishes, or transient registry outage), the composite action
#     falls back to `docker compose build` against the local Dockerfile.
#     Slower path but the same correctness guarantee.
#
# Action SHAs are pinned; Dependabot bumps weekly.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  DOCKER_BUILDKIT: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  msrv:
    # Verify that the pinned MSRV (1.95.0, see `rust-toolchain.toml`)
    # still builds. ADR-0002 scope exception: native runner toolchain
    # rather than dev image — the point is exercising a clean rustc
    # 1.95.0 install, which the image has no mechanism to downgrade to.
    name: msrv (rust 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install Rust 1.95.0 (MSRV)
        # NB: dtolnay/rust-toolchain uses the action ref tag AS the
        # Rust toolchain version. Pin @stable + pass MSRV via `with:`
        # so Dependabot doesn't unintentionally march the MSRV forward
        # (see .github/dependabot.yml ignore entry).
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-targets

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Check Conventional Commits
        run: |
          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          while read -r sha subject; do
            if ! echo "$subject" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .{1,}'; then
              echo "::error::Commit $sha has non-conventional subject: $subject"
              exit 1
            fi
          done < <(git log --format='%H %s' "$range")

  # Phase-1 fast gate. `just check` runs `cargo check` workspace-wide
  # (no codegen, no link) — with the GHA-backed sccache wired in via
  # setup-dev-image, this is typically under 60 s on a warm cache and
  # 2-3 min cold. Slow Phase-2 jobs gate on this so a compile error
  # surfaces in minutes instead of after a 10-min build+test cycle.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just check

  # Phase-2 (needs check). `cargo doc` is the only build pass that runs
  # `broken_intra_doc_links = "deny"` (the lint applies to rustdoc only —
  # `cargo check` / clippy skip it). Without this job, a broken link
  # escapes ci.yml entirely and surfaces post-merge in docs.yml,
  # blocking the Pages deploy. Cheap on a warm sccache: typically 20-40 s.
  doc:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just doc

  # Phase-1 (parallel with `check`). Style + grep checks have no compile
  # dependency, so they run independently and surface formatter/typo
  # complaints in the first minute regardless of whether `check` passes.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just lint

  # Phase-1 (parallel with `check`). Repo-shape sanity (vendored comrak
  # diff = 0 per ADR-0001) does not depend on rust compilation.
  upstream-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just upstream-diff

  # Phase-1 (parallel). Pure grep — no docker image needed, runs in
  # ~5 s on the bare runner. Catches version-pin drift between
  # Dockerfile / playground/package.json / docs.yml that would
  # otherwise let dev and CI silently resolve different tool versions.
  verify-version-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just verify-version-pins

  # Phase-2 (needs check). Full build + test cycle. Doesn't start until
  # `check` has proved the workspace at least typechecks — saves 10 min
  # of wasted compile when a syntax error would have caught it earlier.
  build-and-test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just build
      - run: just test

  # Phase-2 (needs check). CommonMark + GFM conformance.
  # spec-aozora and spec-golden-56656 moved to the aozora sibling repo
  # as part of the v0.2.0 split (see aozora/Justfile). The Aozora
  # notation pipeline is exercised end-to-end through the
  # `aozora_parity` test in afm-markdown's integration suite.
  spec:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target:
          - spec-commonmark
          - spec-gfm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  # Phase-2 (needs check). Instrumented compile, slow.
  coverage:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just coverage

  # Phase-1 partial (deny, audit gate cheaply on Cargo.lock alone), but
  # `udeps` is nightly-bound and needs the dep graph compiled — so the
  # job gates on check to skip wasted work when typecheck has already
  # failed. `fail-fast: false` keeps `deny` failures from masking an
  # `audit` failure and vice-versa.
  audit:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target: [deny, audit, udeps]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          target: book
          tags: afm-book:local
          load: true
          cache-from: type=gha,scope=book
          cache-to: type=gha,mode=max,scope=book
      - run: docker compose run --rm --no-TTY book mdbook build
