# afm CI
#
# Architecture:
#   - The dev container image is built and published by `dev-image.yml`
#     to ghcr.io/p4suta/afm-dev:latest on Dockerfile / compose changes.
#   - This workflow PULLS that image (via the `setup-dev-image`
#     composite action) and invokes `just <target>` on the runner host.
#     `just` recipes wrap each command in `docker compose run dev cargo
#     ...` (Justfile policy: never invoke cargo on the host directly).
#     Running `just` on the runner — instead of `docker compose run ci
#     just <target>` — avoids Docker-in-Docker: the previous nested
#     pattern hit `bash: docker: command not found` because the `ci`
#     container has no docker client.
#   - If the GHCR image is unavailable (first run before dev-image.yml
#     publishes, or transient registry outage), the composite action
#     falls back to `docker compose build` against the local Dockerfile.
#     Slower path but the same correctness guarantee.
#
# Action SHAs are pinned; Dependabot bumps weekly.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  DOCKER_BUILDKIT: "1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  msrv:
    # Verify that the pinned MSRV (1.95.0, see `rust-toolchain.toml`)
    # still builds. ADR-0002 scope exception: native runner toolchain
    # rather than dev image — the point is exercising a clean rustc
    # 1.95.0 install, which the image has no mechanism to downgrade to.
    name: msrv (rust 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install Rust 1.95.0 (MSRV)
        # NB: dtolnay/rust-toolchain uses the action ref tag AS the
        # Rust toolchain version. Pin @stable + pass MSRV via `with:`
        # so Dependabot doesn't unintentionally march the MSRV forward
        # (see .github/dependabot.yml ignore entry).
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --all-targets

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Check Conventional Commits
        run: |
          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          while read -r sha subject; do
            if ! echo "$subject" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .{1,}'; then
              echo "::error::Commit $sha has non-conventional subject: $subject"
              exit 1
            fi
          done < <(git log --format='%H %s' "$range")

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just lint

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just build
      - run: just test

  spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - spec-commonmark
          - spec-gfm
          - spec-aozora
          - spec-golden-56656
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  upstream-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just upstream-diff

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just coverage

  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [deny, audit, udeps]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: ./.github/actions/setup-dev-image
      - run: just ${{ matrix.target }}

  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          target: book
          tags: afm-book:local
          load: true
          cache-from: type=gha,scope=book
          cache-to: type=gha,mode=max,scope=book
      - run: docker compose run --rm --no-TTY book mdbook build
