# cargo publish workflow for the afm workspace.
#
# Publishes the two library/binary crates to crates.io in dependency
# (topological) order: `afm-markdown` (leaf) then `afm-cli` (depends on it).
# Each `cargo publish` waits for its crate to appear in the crates.io index
# before returning (cargo >= 1.66), so afm-cli's resolution finds the
# afm-markdown version just uploaded — no manual `sleep` between steps.
#
# Members marked `publish = false` are intentionally absent: afm-wasm (ships
# via wasm-pack/npm), afm-markdown-test-support and xtask (dev-only), and
# afm-book (the mdbook source, not a crate).
#
# ADR-0002 scope exception: this runs on the native runner toolchain rather
# than the dev image (like the `msrv` CI job). Publishing is a release
# operation that needs only cargo + rustc, not the dev-image tool belt.
#
# Live publish is `dry_run: false`, manual trigger only. Default
# `dry_run: true` so a stray "Run workflow" click cannot push to crates.io.
#
# How to run a real publish:
#   gh workflow run publish-crates.yml -f dry_run=false
# (requires the `CARGO_TOKEN` repo secret = a crates.io API token with BOTH
#  the publish-new and publish-update scopes — the first run creates the
#  brand-new crates.)
#
# NOTE on dry-run coverage: only the dependency-free leaf (`afm-markdown`)
# can be dry-run before anything is on crates.io; an afm-cli dry-run fails
# because its just-bumped afm-markdown dep isn't on the registry yet. The
# real correctness gate is a green `ci-success` before tagging; the
# per-crate verify build that `cargo publish` runs is the final pre-upload
# check. Name availability is NOT checked by dry-run — `afm-markdown` /
# `afm-cli` were verified free on crates.io before the first run.

name: publish-crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no upload): packages + verifies afm-markdown"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # Serialize publishes — crates.io accepts versions linearly and a second
  # concurrent run would just waste tokens.
  group: publish-crates
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: publish-crates

      # Metadata smoke test — always runs, even for a live dispatch, so a
      # packaging / metadata regression surfaces before any upload. Only the
      # leaf crate (no unpublished internal deps) can be dry-run pre-publish.
      - name: Dry-run afm-markdown (metadata smoke test)
        run: cargo publish -p afm-markdown --dry-run --locked

      # Live publish in topological order. Resumable + rate-limit aware:
      # each crate is (a) skipped if its version is already on the registry —
      # so a re-run safely continues a partial publish — and (b) retried
      # after a wait when the upload is rejected with HTTP 429.
      - name: Publish to crates.io (topological, resumable)
        if: inputs.dry_run == false
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          ua="afm-release (+https://github.com/P4suta/afm)"
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Publishing workspace version: ${ver}"
          publish_one() {
            crate="$1"
            code="$(curl -s -H "User-Agent: ${ua}" -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${ver}" || echo 000)"
            if [ "${code}" = "200" ]; then
              echo "::notice::skip ${crate} ${ver} (already on crates.io)"
              return 0
            fi
            tries=0
            while :; do
              tries=$((tries + 1))
              if out="$(cargo publish -p "${crate}" --locked 2>&1)"; then
                printf '%s\n' "${out}"
                echo "::notice::published ${crate} ${ver}"
                return 0
              fi
              printf '%s\n' "${out}"
              if printf '%s' "${out}" | grep -qiE '429|too many|rate.?limit'; then
                echo "::warning::rate-limited on ${crate} (attempt ${tries}); waiting 630s before retry"
                sleep 630
                continue
              fi
              echo "::error::failed to publish ${crate} (non-rate-limit error)"
              return 1
            done
          }
          for crate in afm-markdown afm-cli; do
            echo "::group::publish ${crate}"
            publish_one "${crate}" || exit 1
            echo "::endgroup::"
          done
