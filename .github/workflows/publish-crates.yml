# cargo publish workflow for the aozora-flavored-markdown workspace.
#
# Publishes the two library/binary crates to crates.io in dependency
# (topological) order: `aozora-flavored-markdown` (leaf) then `aozora-flavored-markdown-cli` (depends on it).
# Each `cargo publish` waits for its crate to appear in the crates.io index
# before returning (cargo >= 1.66), so aozora-flavored-markdown-cli's resolution finds the
# aozora-flavored-markdown version just uploaded — no manual `sleep` between steps.
#
# Members marked `publish = false` are intentionally absent: aozora-flavored-markdown-wasm (ships
# via wasm-pack/npm), aozora-flavored-markdown-test-support and xtask (dev-only), and
# aozora-flavored-markdown-book (the mdbook source, not a crate).
#
# ADR-0002 scope exception: this runs on the native runner toolchain rather
# than the dev image (like the `msrv` CI job). Publishing is a release
# operation that needs only cargo + rustc, not the dev-image tool belt.
#
# SECURITY MODEL (industry-standard, mirrors P4suta/aozora):
#   * The live `publish` job runs in the `release` GitHub Environment, so
#     it pauses for required-reviewer approval and can only reach
#     credentials after a deployment protection rule passes. The `package`
#     dry-run smoke test runs ungated (no credentials needed).
#   * Default `use_oidc: true` mints a short-lived crates.io token via
#     OIDC Trusted Publishing (rust-lang/crates-io-auth-action), revoked
#     automatically when the job ends — no long-lived secret.
#     Ref: https://crates.io/docs/trusted-publishing
#   * Default `dry_run: true` so a stray "Run workflow" click cannot push.
#
# How to run a real publish (steady state, no secret):
#   gh workflow run publish-crates.yml -f dry_run=false   # then approve
#
# Register the trusted publisher once per crate (these crates already
# exist on crates.io, so no token bootstrap is needed): crates.io → the
# crate → Settings → Trusted Publishing → GitHub, owner=P4suta,
# repo=aozora-flavored-markdown, workflow=publish-crates.yml,
# environment=release. Then delete the CARGO_TOKEN secret. If you ever
# need the legacy token path, run with `-f use_oidc=false`.
#
# NOTE on dry-run coverage: only the dependency-free leaf (`aozora-flavored-markdown`)
# can be dry-run before anything is on crates.io; an aozora-flavored-markdown-cli dry-run fails
# because its just-bumped aozora-flavored-markdown dep isn't on the registry yet. The
# real correctness gate is a green `ci-success` before tagging; the
# per-crate verify build that `cargo publish` runs is the final pre-upload
# check.

name: publish-crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no upload): packages + verifies aozora-flavored-markdown"
        type: boolean
        default: true
      use_oidc:
        description: "Authenticate via OIDC Trusted Publishing. Uncheck to fall back to the CARGO_TOKEN env secret."
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # Serialize publishes — crates.io accepts versions linearly and a second
  # concurrent run would just waste tokens.
  group: publish-crates
  cancel-in-progress: false

jobs:
  # Metadata smoke test — runs ungated on every dispatch (no credentials,
  # so no environment approval needed). Only the leaf crate can be dry-run
  # pre-publish. A live publish `needs:` this job, so a packaging/metadata
  # regression surfaces before any upload.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: publish-crates-package

      - name: Dry-run aozora-flavored-markdown (metadata smoke test)
        run: cargo publish -p aozora-flavored-markdown --dry-run --locked

  # Live publish in topological order, gated behind the `release`
  # environment (required-reviewer approval + deployment branch/tag
  # restriction). Credentials are only reachable after approval.
  publish:
    needs: package
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write  # mint a short-lived crates.io token via OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: publish-crates-publish

      # OIDC Trusted Publishing: exchange the job's OIDC token for a
      # 30-minute crates.io API token, auto-revoked when the job ends.
      # Skipped (legacy CARGO_TOKEN fallback) when use_oidc=false.
      - name: Authenticate to crates.io (OIDC Trusted Publishing)
        id: auth
        if: ${{ inputs.use_oidc }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5

      # Resumable + rate-limit aware: each crate is (a) skipped if its
      # version is already on the registry — so a re-run safely continues
      # a partial publish — and (b) retried after a wait when the upload is
      # rejected with HTTP 429.
      - name: Publish to crates.io (topological, resumable)
        env:
          CARGO_REGISTRY_TOKEN: ${{ inputs.use_oidc && steps.auth.outputs.token || secrets.CARGO_TOKEN }}
        run: |
          ua="aozora-md-release (+https://github.com/P4suta/aozora-flavored-markdown)"
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Publishing workspace version: ${ver}"
          publish_one() {
            crate="$1"
            code="$(curl -s -H "User-Agent: ${ua}" -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${ver}" || echo 000)"
            if [ "${code}" = "200" ]; then
              echo "::notice::skip ${crate} ${ver} (already on crates.io)"
              return 0
            fi
            tries=0
            while :; do
              tries=$((tries + 1))
              if out="$(cargo publish -p "${crate}" --locked 2>&1)"; then
                printf '%s\n' "${out}"
                echo "::notice::published ${crate} ${ver}"
                return 0
              fi
              printf '%s\n' "${out}"
              if printf '%s' "${out}" | grep -qiE '429|too many|rate.?limit'; then
                echo "::warning::rate-limited on ${crate} (attempt ${tries}); waiting 630s before retry"
                sleep 630
                continue
              fi
              echo "::error::failed to publish ${crate} (non-rate-limit error)"
              return 1
            done
          }
          for crate in aozora-flavored-markdown aozora-flavored-markdown-cli; do
            echo "::group::publish ${crate}"
            publish_one "${crate}" || exit 1
            echo "::endgroup::"
          done
