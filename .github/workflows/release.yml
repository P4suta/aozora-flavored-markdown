# Release workflow for Aozora Flavored Markdown (afm).
#
# Trigger on: annotated tags matching `v*`, plus manual `workflow_dispatch`
# for dry runs. Builds the `afm` CLI on three target triples and uploads
# the archives + SHA256SUMS to the GitHub Release.
#
# ADR-0002 scope exception: release builds run on native GitHub Actions
# runners with the matching stable rustc, *not* inside the dev Docker
# image. The Docker-only rule applies to development and CI; release
# artefacts need to match each runner OS exactly, so we use the native
# toolchain here. See CONTRIBUTING.md "How to release" for the full
# rationale.
#
# Action pinning: every third-party action below is pinned to a full
# commit SHA (the `# vX.Y.Z` trailer is the human-readable tag it
# resolved to) so a re-pointed tag can't silently change what runs in a
# release. Dependabot's github-actions ecosystem bumps these SHAs weekly.
# The sole exception is `dtolnay/rust-toolchain@stable`: its ref is the
# moving `stable` branch by design (we want the latest stable rustc for
# release artefacts), and dependabot.yml ignores it for that reason.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      # Explicit `rustup target add` is more reliable than the action's
      # `targets:` input across stable channel updates — `rustup target
      # add` is idempotent and unambiguous on every cache state.
      - run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: release-${{ matrix.target }}

      - name: Build afm
        run: cargo build --release --target ${{ matrix.target }} --package afm-cli

      - name: Assemble archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail

          # On tag push, use the tag directly; on manual dispatch, tag
          # the artefact as a dispatch dry-run so it never collides with
          # a real release.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              tag="v0.0.0-dispatch.$(date -u +%Y%m%d%H%M%S)"
          else
              tag="${GITHUB_REF_NAME}"
          fi

          name="afm-${tag}-${{ matrix.target }}"
          staging="${RUNNER_TEMP}/${name}"
          mkdir -p "${staging}"

          bin_suffix=""
          [[ "${{ matrix.archive }}" == "zip" ]] && bin_suffix=".exe"
          cp "target/${{ matrix.target }}/release/afm${bin_suffix}" "${staging}/"

          cp LICENSE-APACHE LICENSE-MIT NOTICE README.md "${staging}/"

          cd "${RUNNER_TEMP}"
          case "${{ matrix.archive }}" in
              zip)
                  7z a "${name}.zip" "${name}" > /dev/null
                  artefact="${name}.zip"
                  ;;
              tar.gz)
                  tar czf "${name}.tar.gz" "${name}"
                  artefact="${name}.tar.gz"
                  ;;
          esac

          # sha256 tool varies by OS: shasum exists on macOS + Linux;
          # sha256sum exists on Linux + Git-for-Windows but not macOS.
          if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "${artefact}" > "${artefact}.sha256"
          else
              sha256sum "${artefact}" > "${artefact}.sha256"
          fi

          echo "archive=${RUNNER_TEMP}/${artefact}" >> "$GITHUB_OUTPUT"
          echo "checksum=${RUNNER_TEMP}/${artefact}.sha256" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload build artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ steps.archive.outputs.name }}
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.checksum }}
          retention-days: 7

  publish:
    name: publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: afm-*
          merge-multiple: true
          path: artefacts

      - name: Aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artefacts
          # Produce a single SHA256SUMS file for the whole release so
          # users can `sha256sum --check SHA256SUMS` in one go.
          sha256sum afm-*.tar.gz afm-*.zip 2>/dev/null | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: |
            artefacts/afm-*.tar.gz
            artefacts/afm-*.zip

      - name: Generate release notes with git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          # git-cliff-action writes its output to this path.
          OUTPUT: CHANGES.md

      - name: Show release notes
        run: cat CHANGES.md

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            artefacts/afm-*.tar.gz
            artefacts/afm-*.zip
            artefacts/*.sha256
            artefacts/SHA256SUMS
          body_path: CHANGES.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
