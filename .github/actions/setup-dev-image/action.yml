# Composite action: install `just` on the runner, wire sccache to the
# GitHub Actions cache backend, and provision the afm dev image
# (pulled from GHCR or, if pull fails, built locally from the in-tree
# Dockerfile).
#
# Used by every ci.yml job that invokes `just <target>`. Pulling the
# pre-built image from ghcr.io/p4suta/afm-dev cuts ~30 minutes off the
# wall-clock relative to building the image inline; falling back to
# `docker compose build` keeps CI self-bootstrapping when GHCR is
# unavailable (first push, registry outage, fork PR without packages
# read).
#
# After the Dockerfile fuzz/ci split, the GHCR image is the `ci` stage
# (a superset of dev → fuzz → ci), so tagging it as all three
# `afm-{dev,fuzz,ci}:local` keeps every compose service satisfiable
# from the single pulled image.

name: setup-dev-image
description: Pull (or build) the afm dev image, install `just`, and enable sccache GHA backend.

runs:
  using: composite
  steps:
    - uses: taiki-e/install-action@v2
      with:
        tool: just

    # Provision sccache against the GitHub Actions cache backend. This
    # action only configures the host; the sccache binary itself lives
    # inside the dev image. Setting the three env vars below routes
    # container-side `sccache` calls through the GHA cache via the
    # runner's ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN.
    - uses: mozilla-actions/sccache-action@v0.0.9

    # Forward the GHA cache env into the compose services. Without these
    # the container sccache silently falls back to the disk volume at
    # /workspace/.sccache — the local-dev behaviour, which on an
    # ephemeral runner means a cold cache every job. Setting them here
    # turns every matrix job's sccache into a hot, cross-run cache.
    - name: Enable GHA-backend sccache for compose services
      shell: bash
      run: |
        {
          echo "SCCACHE_GHA_ENABLED=true"
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}"
        } >> "$GITHUB_ENV"

    # Run the compose containers as root on CI. The image defaults to a
    # non-root user (UID 1000) so local bind-mount writes are host-owned, but
    # the runner's checkout is owned by a *different* UID — a non-root
    # container can't create files (wasm pkg/, mdbook book/, dist/) inside
    # runner-owned tree directories. Ownership is throwaway on the ephemeral
    # runner, so root is the simplest correct choice and matches the
    # historical (proven-green) CI behaviour. Read by `user:` in
    # docker-compose.yml via the AFM_UID/AFM_GID defaults.
    - name: Run compose containers as root on CI
      shell: bash
      run: |
        {
          echo "AFM_UID=0"
          echo "AFM_GID=0"
        } >> "$GITHUB_ENV"

    # docker/login-action authenticates the runner against GHCR using
    # the standard GITHUB_TOKEN. Skipped on fork PRs where the token
    # lacks `packages: read` — those runs go through the build
    # fallback below. Same-repo runs always log in.
    - name: Log in to GHCR (same-repo runs only)
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Pull dev image (GHCR) or fall back to local build
      shell: bash
      run: |
        set -euo pipefail
        if docker pull ghcr.io/p4suta/afm-dev:latest; then
          docker tag ghcr.io/p4suta/afm-dev:latest afm-dev:local
          docker tag ghcr.io/p4suta/afm-dev:latest afm-fuzz:local
          docker tag ghcr.io/p4suta/afm-dev:latest afm-ci:local
          echo "::notice title=dev image::Pulled afm-dev:latest from GHCR"
        else
          echo "::warning title=dev image::GHCR pull failed; falling back to local Dockerfile build"
          docker compose build dev
          docker compose build fuzz
          docker tag afm-fuzz:local afm-ci:local
        fi
