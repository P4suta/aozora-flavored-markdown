# Composite action: install `just`, wire sccache to the GitHub Actions
# cache backend, and provision the afm dev image (pulled from GHCR, or
# built locally from the in-tree Dockerfile if the pull fails).
#
# The pull saves ~30 min over an inline build; the fallback keeps CI
# self-bootstrapping when GHCR is unavailable (first push, registry
# outage, fork PR without packages read).
#
# The GHCR image is the `ci` stage (a superset of dev -> fuzz -> ci), so
# it's tagged as all three `afm-{dev,fuzz,ci}:local` to satisfy every
# compose service from the single pulled image.

name: setup-dev-image
description: Pull (or build) the afm dev image, install `just`, and enable sccache GHA backend.

runs:
  using: composite
  steps:
    - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
      with:
        tool: just

    # Configures the host for sccache against the GHA cache backend; the
    # sccache binary itself lives inside the dev image. The env vars set
    # below route container-side sccache through the GHA cache.
    - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

    # Forward the GHA cache env into the compose services. Without these
    # the container sccache falls back to the disk volume at
    # /workspace/.sccache, which on an ephemeral runner is a cold cache
    # every job.
    - name: Enable GHA-backend sccache for compose services
      shell: bash
      run: |
        {
          echo "SCCACHE_GHA_ENABLED=true"
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}"
        } >> "$GITHUB_ENV"

    # Run compose containers as root on CI. The image defaults to non-root
    # (UID 1000) for host-owned bind-mount writes in local dev, but the
    # runner's checkout is owned by a different UID, so a non-root container
    # can't write generated files (wasm pkg/, mdbook book/, dist/) into it.
    # Read by `user:` in docker-compose.yml via the AFM_UID/AFM_GID defaults.
    - name: Run compose containers as root on CI
      shell: bash
      run: |
        {
          echo "AFM_UID=0"
          echo "AFM_GID=0"
        } >> "$GITHUB_ENV"

    # Log in to GHCR with GITHUB_TOKEN. Skipped on fork PRs (token lacks
    # `packages: read`); those runs take the build fallback below.
    - name: Log in to GHCR (same-repo runs only)
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Pull dev image (GHCR) or fall back to local build
      shell: bash
      run: |
        set -euo pipefail
        if docker pull ghcr.io/p4suta/afm-dev:latest; then
          docker tag ghcr.io/p4suta/afm-dev:latest afm-dev:local
          docker tag ghcr.io/p4suta/afm-dev:latest afm-fuzz:local
          docker tag ghcr.io/p4suta/afm-dev:latest afm-ci:local
          echo "::notice title=dev image::Pulled afm-dev:latest from GHCR"
        else
          echo "::warning title=dev image::GHCR pull failed; falling back to local Dockerfile build"
          docker compose build dev
          docker compose build fuzz
          docker tag afm-fuzz:local afm-ci:local
        fi
