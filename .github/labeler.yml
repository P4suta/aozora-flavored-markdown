# PR area labels, applied by .github/workflows/labeler.yml (actions/labeler
# v5) from the paths a PR touches. Labels must already exist in the repo.
# Dependency PRs are labelled separately by Dependabot (rust / docker /
# github_actions / dependencies), so these are the human-authored areas.

"area: markdown":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/aozora-flavored-markdown/**"
          - "crates/aozora-flavored-markdown-test-support/**"

"area: cli":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/aozora-flavored-markdown-cli/**"

"area: wasm":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/aozora-flavored-markdown-wasm/**"
          - "playground/**"

"area: book":
  - changed-files:
      - any-glob-to-any-file:
          - "crates/aozora-flavored-markdown-book/**"

"area: dev":
  - changed-files:
      - any-glob-to-any-file:
          - "Justfile"
          - "Dockerfile"
          - "docker-compose.yml"
          - ".devcontainer/**"
          - "lefthook.yml"
          - ".cargo/**"
          - "rust-toolchain.toml"

"area: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
