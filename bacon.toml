# bacon config for aozora-flavored-markdown. Launch with `just watch` (runs in the dev container,
# ADR-0002). Reference: https://dystroy.org/bacon/config/

default_job = "check"

# Fast edit-compile loop; `cargo check` skips codegen.
[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false
watch = ["crates", "upstream/comrak/src", "spec"]
on_change_strategy = "kill_then_restart"

# [workspace.lints] is the single source of truth, so the flag surface is minimal.
[jobs.clippy]
command = [
    "cargo", "clippy",
    "--workspace", "--all-targets", "--all-features",
    "--color", "always",
    "--", "-D", "warnings",
]
need_stdout = false

[jobs.test]
command = [
    "cargo", "nextest", "run",
    "--workspace", "--all-targets",
    "--color", "always",
]
need_stdout = true
analyzer = "nextest"
