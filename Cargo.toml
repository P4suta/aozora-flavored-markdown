[workspace]
resolver = "3"
members = [
    "crates/afm-syntax",
    "crates/afm-parser",
    "crates/afm-encoding",
    "crates/afm-cli",
    "crates/xtask",
]
# afm-book is an mdbook site, not a Rust crate, so it is not a workspace member.
# upstream/comrak is managed by xtask and vendored verbatim; it does not participate
# in the workspace build (afm-parser depends on the upstream path directly).
exclude = ["upstream/comrak", "crates/afm-book"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95.0"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/yasunobu/afm"
authors = ["afm contributors"]
readme = "README.md"
keywords = ["markdown", "aozora", "japanese", "typography", "parser"]
categories = ["parser-implementations", "text-processing", "localization"]

[workspace.lints.rust]
# Hard bans — the compiler rejects these rather than warning.
unsafe_code = "forbid"

# Strong signals that tend to mask real bugs.
missing_debug_implementations = "warn"
missing_copy_implementations  = "warn"
trivial_casts                 = "warn"
trivial_numeric_casts         = "warn"
# `unreachable_pub` is noisy in binary crates where `pub` items are reachable
# from `main.rs` but not "exported". Skip for now; revisit when the lib/bin
# split stabilises.
unused_import_braces          = "warn"
unused_lifetimes              = "warn"
unused_qualifications         = "warn"
# Warn on edition-drift so we catch idioms deprecated by the next edition early.
rust_2024_compatibility = { level = "warn", priority = -1 }

[workspace.lints.clippy]
# Opt-in to all three lint groups that mainstream Rust libraries ship with.
# `priority = -1` lets specific carve-outs below override individual lints.
pedantic = { level = "warn", priority = -1 }
nursery  = { level = "warn", priority = -1 }
cargo    = { level = "warn", priority = -1 }

# Specific high-value promotions — catch bugs that routinely slip past default
# clippy. Tests are exempted from unwrap/expect/panic via clippy.toml so these
# only bite production code paths.
dbg_macro           = "warn"  # ban forgotten `dbg!` drops
todo                = "warn"  # pair with strict-code grep for issue-ref
unimplemented       = "warn"
clone_on_ref_ptr    = "warn"
unnecessary_safety_comment = "warn"
unnecessary_safety_doc     = "warn"
missing_assert_message     = "warn"

# Justified carve-outs. Keep this list short and documented.
module_name_repetitions = "allow" # `afm_syntax::syntax_error` is clearer than fighting this
multiple_crate_versions = "allow" # transitive dep collisions are not our problem
# Public APIs on stubs need these in places; we revisit when crate stabilises.
missing_const_for_fn    = "allow"

[workspace.dependencies]
# Internal crates
afm-syntax   = { version = "0.1.0", path = "crates/afm-syntax" }
afm-parser   = { version = "0.1.0", path = "crates/afm-parser" }
afm-encoding = { version = "0.1.0", path = "crates/afm-encoding" }

# comrak vendored fork (path, not crates.io).
# Path is relative to the workspace root. `default-features = false` drops the
# comrak CLI (`cli` / `syntect` / `bon`) which we don't consume; afm-cli is our
# own binary, not comrak's.
comrak = { path = "upstream/comrak", default-features = false }

# Error handling — versions verified against crates.io 2026-04-23
thiserror = "2.0.18"
anyhow    = "1.0"
miette    = { version = "7.6.0", features = ["fancy"] }

# Parsing helpers
winnow                = "1.0"
unicode-segmentation  = "1.13"
regex                 = "1.12"

# Serialization / data
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Encoding
encoding_rs = "0.8.35"

# Observability
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# CLI
clap = { version = "4.6.1", features = ["derive", "wrap_help", "env", "color", "cargo"] }

# Testing
insta             = { version = "1.47", features = ["yaml", "json", "filters"] }
proptest          = "1.11"
criterion         = { version = "0.8", features = ["html_reports"] }
pretty_assertions = "1.4.1"

[profile.release]
lto           = "thin"
codegen-units = 1
strip         = "symbols"
panic         = "abort"
opt-level     = 3

[profile.bench]
inherits = "release"
strip    = "none"
debug    = 1

[profile.dev]
# Faster incremental for large workspaces with a vendored tree
split-debuginfo = "unpacked"

# Optimise proc-macros/build scripts/most upstream in dev to speed the test cycle
[profile.dev.package."*"]
opt-level = 1
