# mise (https://mise.jdx.dev/) — dev-tool versions for the host inner loop and
# the commit-msg hook (`mise install`). Docker is the canonical build/test env
# (ADR-0002); Rust + cargo plugins live in .config/mise/config.toml.
[tools]
just = "latest"
lefthook = "latest"
"github:crate-ci/typos" = "latest"
"github:crate-ci/committed" = "latest"
actionlint = "latest"
