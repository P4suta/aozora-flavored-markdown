# Pre-commit / pre-push hooks — every command runs in the dev container via
# `just` (ADR-0002). Enable with `just hooks`, disable with `just hooks-uninstall`.
# Reference: https://lefthook.dev/configuration/
# `fail_text` on each command is the human hint shown on failure.

# Explicit output set so it survives lefthook default-set changes across versions.
output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_info
  - execution_out
  - skips
  - empty_summary

pre-commit:
  parallel: true
  skip:
    - rebase
    - merge
  commands:
    # `cargo fmt --all` writes; fixes are re-staged so the commit carries them.
    fmt:
      glob: "*.rs"
      run: just fmt
      stage_fixed: true
      fail_text: |
        `cargo fmt` failed. Run `just fmt` manually to see the error.
        Common cause: rustfmt edition mismatch with rust-toolchain.toml.
    clippy:
      glob: "*.{rs,toml}"
      run: just clippy
      fail_text: |
        clippy reported an error. Re-run `just clippy` for the full
        diagnostic. Fix the code rather than silencing the lint.
    typos:
      run: just typos
      fail_text: |
        `typos` found a probable typo. Re-run `just typos`, or add an
        exception to `_typos.toml` if the token is intentional.
    # Vendored comrak drift guard (ADR-0001, 0-line budget); runs only on changes there.
    upstream-diff:
      glob: "upstream/comrak/**"
      run: just upstream-diff
      fail_text: |
        The vendored `upstream/comrak/` tree drifted from its pin
        (ADR-0001, 0-line budget). A genuine comrak change needs its own ADR.

commit-msg:
  commands:
    # Conventional Commits via `committed` (host-side; `{1}` is the message file).
    committed:
      run: committed --commit-file {1}

pre-push:
  # `just ci` runs the gates sequentially, cheap-to-expensive, so early ones
  # fail fast. It mirrors the CI jobs reachable inside the dev image.
  parallel: false
  skip:
    - rebase
  commands:
    ci:
      run: just ci
      fail_text: |
        `just ci` failed. The error is the last `error: recipe \`<name>\`
        failed ...` line above — it names the sub-recipe that bombed.
        Re-run `just ci` directly for unwrapped output.
    # Deep proptest sweep (4096 cases vs CI's 128). Opt out of an unrelated
    # aozora-core failure with `SKIP_TAGS=deep git push` and file an issue.
    prop-deep:
      run: just prop-deep
      tags:
        - deep
      fail_text: |
        Deep proptest regression. Re-run `just prop-deep` to reproduce.
        The failing seed is in nextest's PASS/FAIL line; pass it via
        `AOZORA_PROPTEST_SEED=<n>` to shrink locally.
