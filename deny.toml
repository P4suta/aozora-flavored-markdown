# cargo-deny configuration for the afm workspace.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Union of licenses across the dep graph (comrak is BSD-2-Clause; our crates
# are Apache-2.0 OR MIT).
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0", # mirrors aozora's policy; some transitive deps ship MIT-0
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path-only internal dev-deps (e.g. afm-markdown-test-support) resolve as
# `*` version requirements. This keeps `wildcards = "deny"` rejecting real
# registry wildcards while permitting the in-workspace path form — the
# idiomatic cargo-deny handling, matching aozora, and required once
# crates.io publish strips placeholder versions from path deps.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Sibling-repo aozora-* crates pinned by immutable commit SHA = v0.4.1 (ADR-0010 split).
allow-git = ["https://github.com/P4suta/aozora.git"]
