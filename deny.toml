# cargo-deny configuration for the afm workspace.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Upstream comrak ships BSD-2-Clause; our crates are Apache-2.0 OR MIT.
# The list below is the union of allowed licenses across the dep graph.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    # Permissive, no-attribution. Mirrors the sibling aozora repo's policy
    # so the two graphs accept the same license set (some transitive deps
    # ship MIT-0); keeps the umbrella dependency from tripping cargo-deny.
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Sibling-repo aozora-* crates pinned at the v0.1.0 tag (ADR-0010 split).
allow-git = ["https://github.com/P4suta/aozora.git"]
