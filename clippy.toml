# doc_markdown — domain terms that don't need backticks in docs.
doc-valid-idents = [
    "..",
    "CommonMark",
    "GFM",
    "GitHub",
    "Shift_JIS",
    "NFC",
    "BOM",
    "UTF-8",
    "UTF-16",
    "Aozora",
    "JIS",
]

# Complexity thresholds — tighter than clippy defaults.
too-many-arguments-threshold = 4 # group extra args into a struct
too-many-lines-threshold = 80
cognitive-complexity-threshold = 18
type-complexity-threshold = 250
max-fn-params-bools = 1 # pass an enum instead of two-plus bool flags
enum-variant-name-threshold = 2
enum-variant-size-threshold = 256

msrv = "1.95.0" # matches rust-toolchain.toml

# unwrap / expect / panic are diagnostic shortcuts in tests, bugs in production.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true

avoid-breaking-exported-api = false # pre-1.0
pass-by-value-size-limit = 128      # surface by-value moves of fat structs

# Banned stdlib calls — bug-source or wrong layer. Add entries (with a reason).
disallowed-methods = [
    { path = "std::mem::forget", reason = "leaks destructors; use `ManuallyDrop` or explicit drop" },
    { path = "std::env::set_var", reason = "races with other threads; wire via Options instead" },
    { path = "std::env::remove_var", reason = "see std::env::set_var" },
    { path = "std::process::exit", reason = "bypasses destructors; use `ExitCode` / return from main" },
]

disallowed-types = [
    { path = "std::sync::RwLock", reason = "tokio / parking_lot preferred where available; raise an ADR to opt in" },
]
